<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linktree Moderen - SevenRizz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #1a1a1a;
            color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        /* Styling Profil */
        .profile-section {
            margin-bottom: 30px;
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: block;
            border: 4px solid #2196F3;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            object-fit: cover;
            background-color: #333;
        }

        .username {
            font-size: 1rem;
            color: #aaa;
            margin-bottom: 10px;
            font-weight: 400;
        }

        /* Animasi Ngetik */
        .typing-container {
            font-size: 1.5rem;
            font-weight: 600;
            color: white;
            margin-bottom: 35px;
            display: inline-block;
        }

        .prefix-text {
            margin-right: 5px;
        }

        .typed-text {
            color: #2196F3;
        }

        .cursor {
            display: inline-block;
            background-color: #2196F3;
            width: 3px;
            height: 1.2em;
            margin-left: 2px;
            vertical-align: middle;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Tombol Links */
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            background: #2a2a2a;
            padding: 16px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: block;
            border: 1px solid #333;
        }

        .link-card:hover {
            transform: scale(1.05);
            background: #333;
            border-color: #2196F3;
            box-shadow: 0 10px 25px rgba(33, 150, 243, 0.2);
        }

        footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #555;
            letter-spacing: 1px;
        }

        footer b {
            color: #2196F3;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="profile-section">
            <img src="https://i.postimg.cc/VkCyqQzt/IMG-20260425-013057.jpg" alt="SevenRizz" class="profile-img">
            <div class="username">@Sevenrizz</div>
        </div>

        <div class="typing-container">
            <span class="prefix-text">I'm a</span>
            <span class="typed-text" id="typedText"></span>
            <span class="cursor"></span>
        </div>

        <div class="links">
            <a href="https://wa.me/628982867200" class="link-card" target="_blank">Hire me</a>
            <a href="https://t.me/HallenIskandar" class="link-card" target="_blank">Telegram</a>
            <a href="https://www.instagram.com/sevenriz?igsh=MWdmdm92N29uYjBoYg==" class="link-card" target="_blank">Instagram</a>
        </div>

        <footer>
            Develop By <b>SevenRizz</b>
        </footer>
    </div>

    <script>
        const typedTextSpan = document.getElementById("typedText");
        const words = ["Freelancer", "WebDev", "AppDev"];
        const typingDelay = 150;
        const erasingDelay = 100;
        const newWordDelay = 2000;
        let wordIndex = 0;
        let charIndex = 0;

        function type() {
            if (charIndex < words[wordIndex].length) {
                typedTextSpan.textContent += words[wordIndex].charAt(charIndex);
                charIndex++;
                setTimeout(type, typingDelay);
            } else {
                setTimeout(erase, newWordDelay);
            }
        }

        function erase() {
            if (charIndex > 0) {
                typedTextSpan.textContent = words[wordIndex].substring(0, charIndex - 1);
                charIndex--;
                setTimeout(erase, erasingDelay);
            } else {
                wordIndex++;
                if (wordIndex >= words.length) wordIndex = 0;
                setTimeout(type, typingDelay + 500);
            }
        }

        document.addEventListener("DOMContentLoaded", function() {
            if (words.length) setTimeout(type, 500);
        });
    </script>

</body>
</html>
